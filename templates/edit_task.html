{% extends 'base.html' %}

{% block content %}
<div class="row g-4">
    <div class="col-lg-8">
        <div class="form-card">
            <div class="form-card__header">
                <div>
                    <h2 class="h4 mb-1">Edit Task</h2>
                    <p class="text-muted mb-0">Update details and keep your status accurate.</p>
                </div>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
            <div class="form-card__body">
                <form method="POST" action="{{ url_for('edit_task', task_id=task.id) }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Task Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title"
                               value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description"
                                  rows="4">{{ task.description or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            <option value="Pending" {{ 'selected' if task.status == 'Pending' }}>Pending</option>
                            <option value="Completed" {{ 'selected' if task.status == 'Completed' }}>Completed</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Changes
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="helper-card">
            <div class="helper-card__title">Status Guide</div>
            <ul class="helper-list">
                <li>Pending means work is still in progress.</li>
                <li>Completed indicates the task is done.</li>
                <li>Use the description for extra context.</li>
            </ul>
            <div class="helper-meta">
                <i class="bi bi-calendar-event"></i> Today: {{ today }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
